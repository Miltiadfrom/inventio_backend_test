name: Backend CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted  # <--- Ключевое изменение
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t myproject-backend:latest .

      - name: Deploy to Compose
        run: |
          cd /opt/myproject
          # Копируем свежий docker-compose, если он изменился в репо
          # Или просто обновляем контейнер
          docker compose up -d backend
          docker image prune -f
